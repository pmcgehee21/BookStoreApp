<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ink and Leather</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Ink and Leather Bookstore</h1>
    <nav>
      <button onclick="showSection('browse')">Browse Books</button>
      <button onclick="showSection('cart')">Cart (<span id="cart-count">0</span>)</button>
      <button onclick="showSection('login')" id="nav-login">Login</button>
      <button onclick="showSection('inventory')" id="nav-inventory" class="hidden">Inventory</button>
      <button onclick="showSection('orders')" id="nav-orders" class="hidden">Orders</button>
      <button onclick="logout()" id="nav-logout" class="hidden">Logout</button>
    </nav>
  </header>

  <main>

    <!-- Browse -->
    <section id="browse" class="section">
      <h2>Available Books</h2>

      <div class="search-bar">
        <input 
          type="text" 
          id="search-input" 
          placeholder="Search books..."
      />

      <select id="search-type">
        <option value="all">All</option>
        <option value="title">Title</option>
        <option value="author">Author</option>
        <option value="category">Category</option>
      </select>

      <button onclick="searchBooks()">Search</button>
    </div>

    <div id="book-list"></div>
  </section>

    <!-- Cart -->
    <section id="cart" class="section hidden">
      <h2>Your Cart</h2>
      <div id="cart-items"></div>
      <p><strong>Total: $<span id="cart-total">0.00</span></strong></p>
      <button onclick="checkout()">Checkout</button>
    </section>

    <!-- Login -->
    <section id="login" class="section hidden">
      <h2>Login</h2>
      <input type="email" id="login-email" placeholder="Email" />
      <input type="password" id="login-password" placeholder="Password" />
      <button onclick="login()">Login</button>
      <p id="login-message"></p>
    </section>

    <!-- Employee: Inventory Management -->
    <section id="inventory" class="section hidden">
      <h2>Inventory Management</h2>
      <button onclick="showAddBookForm()">+ Add New Book</button>
      <div id="add-book-form" class="hidden" style="margin-top:1rem;">
        <h3>Add Book</h3>
        <input type="text" id="book-title" placeholder="Title" />
        <input type="text" id="book-author" placeholder="Author Name" />
        <input type="text" id="book-isbn" placeholder="ISBN" />
        <input type="number" id="book-price" placeholder="Price" step="0.01" />
        <input type="number" id="book-stock" placeholder="Stock Quantity" />
        <input type="text" id="book-category" placeholder="Category" />
        <textarea id="book-description" placeholder="Description"></textarea>
        <button onclick="addBook()">Save Book</button>
        <p id="add-book-message"></p>
      </div>
      <h3 style="margin-top:1.5rem;">Current Inventory</h3>
      <div id="inventory-list"></div>
    </section>

    <!-- Employee: All Orders -->
    <section id="orders" class="section hidden">
      <h2>All Orders</h2>
      <div id="orders-list"></div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
